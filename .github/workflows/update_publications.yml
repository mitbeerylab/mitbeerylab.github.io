name: Update Publications from Semantic Scholar

on:
  schedule:
    # Weekly on Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Update publications from Semantic Scholar
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          PI_NAME: ${{ vars.PI_NAME || secrets.PI_NAME }}
          LAB_START_DATE: ${{ vars.LAB_START_DATE || secrets.LAB_START_DATE }}
          S2_AUTHOR_ID: ${{ vars.S2_AUTHOR_ID || secrets.S2_AUTHOR_ID }}
        run: python3 scripts/update_publications_semanticscholar.py --recompute-suggested-themes --apply-suggested-themes

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain -- _data/publications.yml _data/publications_meta.yml)" ]; then
            echo "No publication changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml _data/publications_meta.yml
          git commit -m "Update publications from Semantic Scholar"
          git push
      - name: Trigger site deploy workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          WORKFLOW_FILE: jekyll-gh-pages.yml
          REF: main
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches \
            -d "{\"ref\":\"${REF}\"}"
