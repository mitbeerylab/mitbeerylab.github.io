name: Update Projects from Google Form

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  update-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Update projects from Google Form
        env:
          PROJECTS_SHEET_CSV_URL: ${{ vars.PROJECTS_SHEET_CSV_URL || secrets.PROJECTS_SHEET_CSV_URL }}
        run: python3 scripts/update_projects_from_google_form.py

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain -- _data/software.yml _data/carousel.yml)" ]; then
            echo "No project or carousel changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/software.yml _data/carousel.yml
          git commit -m "Update projects and carousel from Google Form"
          git push
