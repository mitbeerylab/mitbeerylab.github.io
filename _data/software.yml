- title: Align and Distill
  image: https://drive.google.com/thumbnail?id=1u3sWQtZQJddFkjRWYjXH82mbTObOml2T&sz=w400
  description: 'Object detectors often perform poorly on data that differs from their training set. Domainadaptive object detection (DAOD) methods have recently demonstrated strong results onaddressing this challenge. Unfortunately, we identify systemic benchmarking pitfalls thatcall past results into question and hamper further progress: (a) Overestimation of performance due to underpowered baselines, (b) Inconsistent implementation practices preventing transparent comparisons of methods, and (c) Lack of generality due to outdated backbones and lack of diversity in benchmarks. We address these problems by introducing: (1) A unified benchmarking and implementation framework, Align and Distill (ALDI), enablingcomparison of DAOD methods and supporting future development, (2) A fair and moderntraining and evaluation protocol for DAOD that addresses benchmarking pitfalls, (3) A newDAOD benchmark dataset, CFC-DAOD, increasing the diversity of available DAOD bench-marks, and (4) A new method,
    ALDI++, that achieves state-of-the-art results by a largemargin. ALDI++ outperforms the previous state-of-the-art by +3.5 AP50 on Cityscapes→ Foggy Cityscapes, +5.7 AP50 on Sim10k → Cityscapes (where ours is the only methodto outperform a fair baseline), and +0.6 AP50 on CFC-DAOD. ALDI and ALDI++ arearchitecture-agnostic, setting a new state-of-the-art for YOLO and DETR-based DAOD aswell without additional hyperparameter tuning. Our framework, dataset, and methodoffer a critical reset for DAOD and provide a strong foundation for future research.'
