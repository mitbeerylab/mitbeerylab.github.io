- title: Seeing Through the PRISM
  image: https://drive.google.com/thumbnail?id=1p6ufSyGxEv6YJOmEbtOUfb3HMcRC98tv&sz=w400
  description: PRISM is a controllable image restoration framework built for scientific and environmental imagery, where noise, blur, haze, weather, and other distortions often appear together. Instead of fixing one corruption at a time, PRISM learns to handle compound degradations jointly while still letting experts selectively remove only the artifacts they care about. The result is higher-fidelity restoration, stronger generalization to unseen distortion mixtures, and better downstream scientific performance across microscopy, ecology, remote sensing, and urban monitoring.
  themes:
