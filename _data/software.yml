- title: INQUIRE
  image: https://drive.google.com/thumbnail?id=1D0Z--TieTF8lUJGs8AAZ5G0pxvOE_aLK&sz=w400
  description: Expert-level multi-modal models require expert-level benchmarks. We introduce 🔍 INQUIRE, a text-to-image retrieval benchmark of 250 challenging ecological queries that are comprehensively labeled over a new 5 million image subset of iNaturalist (iNat24). We hope that 🔍 INQUIRE will encourage the community to build next-generation image retrieval methods toward the goal of helping accelerate and automate scientific discovery.
