- title: INQUIRE-Search
  image: https://drive.google.com/thumbnail?id=1xQUXWxdMglqEKtvyxRw0hVOUvhQTtPkL&sz=w400
  description: This paper introduces INQUIRE-Search, an open-source system that lets ecologists use natural-language queries to find hard-to-observe phenomena—like behavior, species interactions, phenology, and disturbance responses—inside enormous biodiversity image databases such as iNaturalist. By combining vision-language search with expert verification and exportable results, it makes rare ecological evidence far easier to surface at scale, delivering 3–25× higher retrieval efficiency than comparable manual workflows across five case studies and enabling downstream scientific analysis that was previously impractical.
  themes:
  - Scientific Workflows
