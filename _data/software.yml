- title: Consensus-Driven Active Model Selection
  image: https://drive.google.com/thumbnail?id=1upIQdbinJreLHP0a3Gi7-MdC_UxKJqJU&sz=w400
  description: 'The widespread availability of off-the-shelf machine learning models poses a challenge: which model, of the many available candidates, should be chosen for a given data analysis task? This question of model selection is traditionally answered by collecting and annotating a val- idation dataset—a costly and time-intensive process. We propose a method for active model selection, using predic- tions from candidate models to prioritize the labeling of test data points that efficiently differentiate the best can- didate. Our method, CODA, performs consensus-driven active model selection by modeling relationships between classifiers, categories, and data points within a probabilis- tic framework. The framework uses the consensus and dis- agreement between models in the candidate pool to guide the label acquisition process, and Bayesian inference to up- date beliefs about which model is best as more information is collected. We validate our approach by curating a collection of 26
    benchmark tasks capturing a range of model selection scenarios. CODA outperforms existing methods for active model selection significantly, reducing the annotation effort required to discover the best model by upwards of 70% compared to the previous state-of-the-art.'
  themes:
