- title: Deep Occupancy
  image: https://drive.google.com/thumbnail?id=1DaRlwxaDBwou1S5GGHCL19jMBi2qH47q&sz=w400
  description: Effective conservation and restoration of species is an increasingly urgent priority. To design management strategies that improve species success, we need a solid understanding of the habitat characteristics that support it. Occupancy models are statistical tools that ecologists use to model these relationships from data. Yet, current models represent habitats with coarse-scale environmental variables that fail to capture important microhabitat features. We show that these limitations can be addressed by incorporating AI-derived, multimodal habitat representations from overhead satellite imagery and ground-level camera-trap imagery. Across geography and species, these representations yield more accurate out-of-sample predictions than models based on conventional covariates alone, and combining satellite and ground-level views provides complementary gains. While AI-derived, multimodal habitat representations yield more expressive models, they also need more data to fit successfully.
    We thus show experimentally how much data is needed in order to achieve substantial gains over conventional covariates. We further demonstrate the value of having access to continental-scale over local-scale datasets. Our approach provides a path toward microhabitat-aware and interpretable species-habitat models that support restoration planning and management decisions. We implement our method in an open-source Python package bridging AI and statistical ecology.
  themes:
  - Computer Vision
  - Biodiversity Monitoring
  - Multimodal Modeling
  publication_date: '2026-02-17'
  year: 2026
  links:
